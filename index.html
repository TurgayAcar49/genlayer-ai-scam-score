<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenLayer Scam Guard</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #0a0a1f; color: #fff; text-align: center; padding: 40px; }
    h1 { color: #00ff88; }
    input { padding: 15px; font-size: 18px; width: 420px; border-radius: 12px; border: none; margin: 15px; }
    button { padding: 15px 30px; font-size: 18px; background: #00ff88; color: #000; border: none; border-radius: 12px; cursor: pointer; }
    #result { margin-top: 30px; font-size: 28px; min-height: 80px; }
    .score { font-size: 42px; font-weight: bold; color: #00ff88; }
  </style>
</head>
<body>
  <h1>🔥 GenLayer AI Scam Guard</h1>
  <p>Herhangi bir coin veya proje adı / contract adresi gir → Anında 0-100 scam skoru</p>
  
  <input id="project" type="text" placeholder="Örnek: PEPE, 0x6982508145454ce325ddbe47a25d4ec3d2311933" style="width: 500px;" />
  <br>
  <button onclick="analyze()">Scam Risk'i Hesapla</button>
  
  <div id="result"></div>

  <script>
    const CONTRACT_ADDRESS = "0x2341ae6fA1FCC65b069345d00Df81E622ccc6C34";
    const RPC_URL = "https://rpc.testnet.genlayer.com";

    const provider = new ethers.providers.JsonRpcProvider(RPC_URL);
    const abi = ["function analyze_project(string project_name) public returns (string)"];
    const contract = new ethers.Contract(CONTRACT_ADDRESS, abi, provider);

    async function analyze() {
      const input = document.getElementById("project").value.trim();
      if (!input) return alert("Lütfen coin adı veya contract adresi gir!");

      document.getElementById("result").innerHTML = "🤖 GenLayer AI analiz ediyor...";

      try {
        // callStatic ile transaction göndermeden simüle ediyoruz
        const score = await contract.callStatic.analyze_project(input);
        
        document.getElementById("result").innerHTML = `
          <h2>Scam Risk Score: <span class="score">${score}</span>/100</h2>
          <p><strong>${input}</strong></p>
          <p style="color:#aaa; font-size:18px;">Live on GenLayer Testnet • No wallet needed</p>
        `;
      } catch (e) {
        document.getElementById("result").innerHTML = `<p style="color:red">Hata: ${e.message}</p>`;
      }
    }
  </script>
</body>
</html>
